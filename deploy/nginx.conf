# Nginx配置文件 — 娜娜的工程质量监督Agent
# 将此文件放到 /etc/nginx/sites-available/nana-agent
# 然后 sudo ln -s /etc/nginx/sites-available/nana-agent /etc/nginx/sites-enabled/
#
# ⚠️ 重要：不要在非www和www之间做重定向，否则POST上传会失败！
# 两个域名必须在同一个server块中处理。

# HTTP → HTTPS 重定向（仅80端口）
server {
    listen 80;
    server_name nana-quality-inspection-agent.top www.nana-quality-inspection-agent.top;
    
    # 重要：用302而不是301，且只做HTTP→HTTPS，不做域名间重定向
    return 302 https://$host$request_uri;
}

# HTTPS 主配置（非www和www共用，不做域名重定向）
server {
    listen 443 ssl http2;
    server_name nana-quality-inspection-agent.top www.nana-quality-inspection-agent.top;

    # 禁止Nginx自动添加端口或做域名重定向
    port_in_redirect off;
    server_name_in_redirect off;

    # SSL证书路径（按实际路径修改）
    ssl_certificate /etc/nginx/ssl/nana-agent.pem;
    ssl_certificate_key /etc/nginx/ssl/nana-agent.key;

    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 上传文件大小限制（PDF上传50MB）
    client_max_body_size 50M;

    # 静态文件直接由Nginx处理（更快）
    location /static/ {
        alias /opt/nana-agent/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 反向代理到Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket支持（如果未来需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置（AI深度解析和OCR需要较长时间）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    # gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
